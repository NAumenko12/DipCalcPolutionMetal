name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            cmake \
            libdrogon-dev \
            libjsoncpp-dev \
            librdkafka-dev \
            libpqxx-dev \
            pkg-config

      - name: Verify frontend and C++
        run: bash scripts/verify.sh

  docker-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --target api -t testdip-api:ci .

      - name: Build worker image
        run: docker build --target worker -t testdip-worker:ci .

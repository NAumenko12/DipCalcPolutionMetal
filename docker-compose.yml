services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testdip
      POSTGRES_USER: testdip
      POSTGRES_PASSWORD: testdip
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testdip -d testdip"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.8
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr
      - internal://redpanda:29092,external://127.0.0.1:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 5s
      retries: 12

  redpanda-console:
    image: redpandadata/console:v2.7.2
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8081:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  api:
    build:
      context: .
      target: api
    environment:
      TESTDIP_DATABASE_URL: postgres://testdip:testdip@postgres:5432/testdip
      TESTDIP_KAFKA_BROKERS: redpanda:29092
      TESTDIP_HTTP_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  worker:
    build:
      context: .
      target: worker
    environment:
      TESTDIP_DATABASE_URL: postgres://testdip:testdip@postgres:5432/testdip
      TESTDIP_KAFKA_BROKERS: redpanda:29092
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

volumes:
  postgres-data:
